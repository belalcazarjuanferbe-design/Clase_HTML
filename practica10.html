<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica10</title>
</head>
<body>

    <h1>Tablas</h1>

    <!-- La etiqueta Table se utiliza para definir tablas en html. Todo el contenido de la tabla, incluidas las filas y celdas, se coloca dentro de esta etiqueta -->

    <!-- la etiqueta TR se utiliza para definir una fila en una tabla. cada fila puede contener una o mas celdas, que se definen utilizando las etiquetas TD o TH (para celdas de datos) (para celdas de encabezado) -->

    <!-- La etiqueta td define una celda de encabezado dentro de una fila. cada etiqueta TH representa un encabezado de columna en la tabla -->

    <!-- La etiqueta TH define una celda de encabezado dentro de una fila. cada etiqueta TH representa un encabezado de columna en la tabla -->
    
    <br>
    <br>
    <table><!-- etiqueta de apertura -->
        <!-- fila 1 -->
            <th>Lenguajes de programacion</th> <!-- encabezado -->
            <th>Frameworks</th> <!-- encabezado -->
            <th>algo</th> <!-- encabezado -->
        </tr>
        <!-- fila 2 -->
            <td>python</td> <!-- celda de datos -->
            <td>Django</td> <!-- celda de datos -->
            <td>algo</td> <!-- celda de datos -->
        </tr>
        <!-- fila 3 -->
            <td>javascript</td> <!-- celda de datos -->
            <td>React</td> <!-- celda de datos -->
            <td>algo</td> <!-- celda de datos -->
        </tr>
    </table><!-- etiqueta de cierre -->
    <br>
    <br>
    <table border="1">
        <tr>
            <th>pais</th>
            <th>capital</th>
        </tr>
        <tr>
            <td>España</td>
            <td>Madrid</td>
        </tr>
        <tr>
            <td>Italia</td>
            <td>Roma</td>
        </tr>
        <tr>
            <td>francia</td>
            <td>París</td>
        </tr>
    </table>
    <br>
    <br>
    <table border="1">
        <tr>
            <th colspan="4">mundial de futbol</th>
        </tr>
        <tr>
            <td rowspan="3">Paises con mayoria de goles</td>
            <td>Brasil</td> <td>230</td>
        </tr>
        <tr>
            <td>Alemania</td> <td>180</td>
        </tr>
        <tr>
            <td>argentina</td> <td>150</td>
        </tr>
    </table>
</body>
</html>
