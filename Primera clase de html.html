<!-- indica que se usa el html5 aumenta el SOE para el posicionamiento de la pagina en el navegador -->
<!DOCTYPE html>
<!-- esto es un comentario que no afecta para nada el codigo -->
<!-- html es la base de todo el codigo - lang="en" indica que la pagina esta en ingles se puede cambiar por "es" para el español -->
<html lang="en">
    <!-- el Head es el que contiene todos lo metadatos. en si es el ligar indispensable para el funcionamiento pero no contiene nada que el usuario vea -->
<head>
    <!-- este meta="utf-8" es para las reglas de las tildes eñes y caracteres de cualquier idioma -->
    <meta charset="UTF-8">
    <!-- el name="viewport" content... es para el diseño de la pagina -->
    <!-- el "width=device-width" es para el ajuste de la pagina segun la pantalla del dispositivo -->
    <!-- initial-scale=1.0" indica q el zoom de la pagina es de una 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title porta el titulo de la web -->
    <title>Document</title>
</head>
<!-- contiene toda la informacion y configuracion que ve el usurio. -->
<body>
    
</body>
</html>
